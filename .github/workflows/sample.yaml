name: "Sample"

on: [push, workflow_dispatch]

jobs:
  applies:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      # Export the JSON array of changed folders to the next job
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to detect changes accurately

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          dir_names: true
          json: true
          escape_json: false

      - name: Set Matrix Output
        id: set-matrix
        shell: bash
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          CONFIG_FILE=".github/configs/modules.json"
          TEMP_MATRIX="matrix_temp.json"

          # Ensure config file exists
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "Error: Config file $CONFIG_FILE not found!"
            exit 1
          fi

          # Use env var to avoid injection issues
          CHANGED_DIRS="$CHANGED_FILES"
          echo "Raw changed files: $CHANGED_DIRS"

          # Fix for potential escaped JSON format ([\"path\"]) -> (["path"])
          # This handles cases where the action outputs escaped JSON strings
          if ! echo "$CHANGED_DIRS" | jq empty >/dev/null 2>&1; then
             echo "JSON parse error detected. Attempting to fix escaped quotes..."
             CHANGED_DIRS=$(echo "$CHANGED_DIRS" | sed 's/\\\"/\"/g')
             echo "Fixed changed files: $CHANGED_DIRS"
          fi

          # Initialize output file
          rm -f "$TEMP_MATRIX"
          touch "$TEMP_MATRIX"

          # Handle empty changes gracefully
          if [ -z "$CHANGED_DIRS" ] || [ "$CHANGED_DIRS" == "[]" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Processing changes: $CHANGED_DIRS"

          # Get all environment keys (e.g. prod, dev) dynamically from config
          ENVS=$(jq -r 'keys[]' "$CONFIG_FILE")

          # Iterate through each environment
          for ENV in $ENVS; do
            echo "Checking environment: $ENV"
            
            # Extract modules list for this environment
            MODULES=$(jq -r --arg e "$ENV" '.[$e][]' "$CONFIG_FILE")
            
            # Check each module path against changed directories
            while IFS= read -r MOD_PATH; do
              [ -z "$MOD_PATH" ] && continue
              
              # Check match: does any changed file start with the module path?
              MATCH=$(echo "$CHANGED_DIRS" | jq --arg mod "$MOD_PATH" 'any(.[]; . == $mod or startswith($mod + "/"))')
              
              if [ "$MATCH" == "true" ]; then
                echo "  -> Match found: $MOD_PATH"
                # Append JSON object to temporary file
                jq -n --arg p "$MOD_PATH" --arg e "$ENV" '{path: $p, env: $e}' >> "$TEMP_MATRIX"
              fi
            done <<< "$MODULES"
          done

          # Consolidate results into a single JSON array
          if [ -s "$TEMP_MATRIX" ]; then
            FINAL_MATRIX=$(jq -s -c '.' "$TEMP_MATRIX")
          else
            FINAL_MATRIX="[]"
          fi

          echo "Final Matrix: $FINAL_MATRIX"
          echo "matrix=${FINAL_MATRIX}" >> $GITHUB_OUTPUT
          rm -f "$TEMP_MATRIX"

  terraform:
    needs: applies
    runs-on: ubuntu-latest
    if: needs.applies.outputs.matrix != '[]' && needs.applies.outputs.matrix != ''
    strategy:
      matrix:
        include: ${{ fromJson(needs.applies.outputs.matrix) }}
    steps:
      - name: Echo Module Info
        run: |
          echo "Processing Module Change"
          echo "------------------------"
          echo "Environment: ${{ matrix.env }}"
          echo "Module Path: ${{ matrix.path }}"
          echo "Action: Running plan/apply logic here..."
